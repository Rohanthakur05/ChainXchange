<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <!-- ═══ ChainXchange Favicon Set ═══ -->
  <!-- Primary SVG favicon — scales to any size, works in all modern browsers -->
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <!-- Fallback PNG for browsers that don't support SVG favicons (older Safari, IE) -->
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon.svg" />
  <!-- Apple Touch Icon — used for iOS home screen and bookmarks -->
  <link rel="apple-touch-icon" href="/favicon.svg" />
  <!-- PWA manifest — enables installable app + Android icon -->
  <link rel="manifest" href="/site.webmanifest" />
  <!-- Browser chrome accent colour (mobile address bar) -->
  <meta name="theme-color" content="#22c55e" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChainXchange</title>

  <!-- FOUC Prevention: Apply theme before page renders -->
  <script>
    (function () {
      try {
        var stored = localStorage.getItem('chainxchange-theme');
        var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        var theme = stored || (prefersDark ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', theme);
      } catch (e) {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    })();
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
